kind = "web"
previewPath = "/"
title = "Barakat Estate"
version = "1.0.0"
id = "artifacts/barakat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22937

[services.development]
run = "pnpm --filter @workspace/barakat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barakat", "run", "build" ]
publicDir = "artifacts/barakat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22937"
BASE_PATH = "/"
